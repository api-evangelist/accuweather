openapi: 3.0.1
info:
  title: AccuWeather One API
  description: AccuWeather's internal product API for the One platform.
  version: v1
paths:
  /api/autocomplete:
    get:
      tags: []
      summary: AccuWeather Retrieves a List of Locations Matching the Specified Query
      parameters:
      - name: Query
        in: query
        description: The partial query to search against. Eg. 'New' to get things like New York or New Market
        required: true
        schema:
          type: string
          example: New
        example: New
      - name: Latitude
        in: query
        description: The latitude where responses will be biased.
        schema:
          type: number
          format: double
        example: 40.7128
      - name: Longitude
        in: query
        description: The longitude where responses will be biased.
        schema:
          type: number
          format: double
        example: -74.006
      - name: Locale
        in: query
        description: ISO 639-2 and ISO 3166-1 code for the locale
        schema:
          type: string
          example: en-us
        example: en-us
      - name: MeasurementDisplay
        in: query
        description: Display type for weather conditions and distance
        schema:
          $ref: '#/components/schemas/MeasurementDisplayType'
        example: Imperial
      - name: WindUnit
        in: query
        description: Additional display type for wind direction
        schema:
          $ref: '#/components/schemas/WindDirectionDisplayType'
        example: Cardinal
      - name: Theme
        in: query
        description: Theme for the application
        schema:
          $ref: '#/components/schemas/ThemeType'
        example: System
      responses:
        '200':
          description: Locations found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AutocompleteLocation'
              examples:
                _api_autocomplete200Example:
                  summary: Default _api_autocomplete 200 response
                  x-microcks-default: true
                  value:
                  - locationType: address
                    city: London
                    adminCode: PA
                    countryCode: US
                    postalCode: example-value
                    position: &id001
                    - 51.50032
                    - -0.145433
                    name: Buckingham Palace
                    longName: Buckingham Palace, Westminster, London, Greater London GBR
                    locationSettingsInfo:
                      id: 50603e3f-5433-4d14-9b5f-01c8cf619d9b
                      locationKey: '328328'
                      name: State Collage
                      longName: 385 Science Park Rd, State College, PA
                      displayName: 385 Science Park Rd, State College, PA or Eureka, CA USA
                      stationCode: EGRB
                      supportedDataSets: &id002
                      - AirQualityCurrentConditions
                      - AirQualityForecasts
                      - Alerts
                      - DailyAirQualityForecast
                      - DailyPollenForecast
                      - ForecastConfidence
                      - FutureRadar
                      - MinuteCast
                      - ProximityNotification-Lightning
                      - Radar
                      supportsMinuteCast: true
                      latitude: 40.7128
                      longitude: -74.006
                      supportsEventConfidence: true
                    source: AccuWeather
        '400':
          description: Parameters are bad, details in body.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /api/resolve-location-redirect:
    get:
      tags: []
      summary: AccuWeather Takes in a Location as a Query Parameter
      parameters:
      - name: LocationType
        in: query
        description: The type of location to resolve. Eg. address, postalCode, place, locality
        schema:
          type: string
          example: city
        example: city
      - name: PostalCode
        in: query
        description: The postal code of the location to resolve.
        schema:
          type: string
          example: SW1A 1AA
        example: SW1A 1AA
      - name: City
        in: query
        description: The city of the location to resolve.
        schema:
          type: string
          example: London
        example: London
      - name: AdminCode
        in: query
        description: The admin code for the location.
        schema:
          type: string
          example: PA
        example: PA
      - name: CountryCode
        in: query
        description: The country code for the location.
        schema:
          type: string
          example: US
        example: US
      - name: Position
        in: query
        description: Comma separated position of the location to resolve. Longitude, Latitude.
        schema:
          type: string
          example: 51.500321,-0.145433
        example: 51.500321,-0.145433
      - name: Name
        in: query
        description: Simple name for a location, such as the name of a city
        schema:
          type: string
          example: State Collage
        example: State Collage
      - name: LongName
        in: query
        description: Full name for a location, such as the name of an Admin or address
        schema:
          type: string
          example: 385 Science Park Rd, State College, PA
        example: 385 Science Park Rd, State College, PA
      - name: LocationKey
        in: query
        description: AccuWeather Location key
        schema:
          type: string
          example: '335315'
        example: '335315'
      - name: IsCurrent
        in: query
        description: if 'use current location' was selected
        schema:
          type: boolean
          example: true
        example: true
      - name: RecentId
        in: query
        description: recent location's guid
        schema:
          type: string
          example: tru4fa4496d-fca1-4c30-8784-fb612a45ee52e
        example: tru4fa4496d-fca1-4c30-8784-fb612a45ee52e
      - name: FavoriteId
        in: query
        description: favorite location's guid (Used for Edit)
        schema:
          type: string
          example: tru4fa4496d-fca1-4c30-8784-fb612a45ee52e
        example: tru4fa4496d-fca1-4c30-8784-fb612a45ee52e
      - name: Language
        in: query
        description: Language for the query to use for the response.
        schema:
          type: string
          example: en-us
        example: en-us
      responses:
        '200':
          description: Location resolved
          content:
            application/html:
              schema:
                $ref: '#/components/schemas/AutocompleteLocation'
        '404':
          description: Location was unable to be resolved
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
