naftiko: 1.0.0-alpha2
info:
  label: AccuWeather Weather Intelligence
  description: Unified workflow combining AccuWeather's location, conditions, forecasts, air quality, and storm tracking APIs
    into a single capability for weather-aware applications. Used by developers, IoT platforms, travel apps, and emergency
    management systems.
  tags:
  - AccuWeather
  - Weather
  - Forecasts
  - Air Quality
  - Storm Tracking
  - Location Services
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    ACCUWEATHER_API_KEY: ACCUWEATHER_API_KEY
capability:
  consumes:
  - type: http
    namespace: accuweather
    baseUri: https://dataservice.accuweather.com
    description: AccuWeather One Platform API for weather data and location services.
    authentication:
      type: apikey
      key: apikey
      value: '{{ACCUWEATHER_API_KEY}}'
      placement: query
    resources:
    - name: locations
      path: /api
      description: Location search and autocomplete
      operations:
      - name: autocomplete-locations
        method: GET
        description: AccuWeather Retrieves a List of Locations Matching the Specified Query
        inputParameters:
        - name: Query
          in: query
          type: string
          required: true
          description: Partial query text for location search
        - name: Locale
          in: query
          type: string
          required: false
          description: ISO 639-2 and ISO 3166-1 code for the locale
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: resolve-location
        method: GET
        description: AccuWeather Takes in a Location as a Query Parameter and Returns Location Key
        inputParameters:
        - name: locationKey
          in: query
          type: string
          required: true
          description: Location key to resolve
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: current-conditions
      path: /api/current
      description: Current weather conditions by location
      operations:
      - name: get-current-conditions
        method: GET
        description: AccuWeather Retrieves the Latest Weather Conditions for a Location
        inputParameters:
        - name: locationKey
          in: path
          type: string
          required: true
          description: AccuWeather location key
        - name: MeasurementDisplay
          in: query
          type: string
          required: false
          description: Imperial or Metric measurement display
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: forecasts
      path: /api
      description: Hourly, daily, and minute-by-minute forecasts
      operations:
      - name: get-hourly-forecast
        method: GET
        description: AccuWeather Retrieves the Latest Hourly Forecast for a Location
        inputParameters:
        - name: locationKey
          in: path
          type: string
          required: true
          description: AccuWeather location key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-daily-forecast
        method: GET
        description: AccuWeather Retrieves the Latest Daily Forecast for a Location
        inputParameters:
        - name: locationKey
          in: path
          type: string
          required: true
          description: AccuWeather location key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-minutecast
        method: GET
        description: AccuWeather Retrieves the Latest Minute by Minute Forecast for a Location
        inputParameters:
        - name: locationKey
          in: path
          type: string
          required: true
          description: AccuWeather location key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: air-quality
      path: /api/airQuality
      description: Air quality and hourly AQI data
      operations:
      - name: get-air-quality
        method: GET
        description: AccuWeather Retrieves the Current Air Quality for a Given Location
        inputParameters:
        - name: locationKey
          in: path
          type: string
          required: true
          description: AccuWeather location key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-hourly-air-quality
        method: GET
        description: AccuWeather Retrieves the Hourly Air Quality Forecast for a Given Location
        inputParameters:
        - name: locationKey
          in: path
          type: string
          required: true
          description: AccuWeather location key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: storms
      path: /api
      description: Tropical storms and active storm tracking
      operations:
      - name: get-active-storms
        method: GET
        description: AccuWeather Retrieves All Active Global Storms
        inputParameters:
        - name: locationKey
          in: path
          type: string
          required: true
          description: Location key for storm context
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-storm-details
        method: GET
        description: AccuWeather Retrieves Data About a Specific Storm
        inputParameters:
        - name: year
          in: path
          type: integer
          required: true
          description: Year of the storm
        - name: basinId
          in: path
          type: string
          required: true
          description: Basin identifier
        - name: depressionNumber
          in: path
          type: integer
          required: true
          description: Depression number of the storm
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: weather-intelligence-api
    description: Unified REST API for AccuWeather weather intelligence workflows.
    resources:
    - path: /v1/locations
      name: locations
      description: Search for weather locations
      operations:
      - method: GET
        name: search-locations
        description: Search for weather locations by text query
        call: accuweather.autocomplete-locations
        with:
          Query: rest.query
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/weather/current/{locationKey}
      name: current-conditions
      description: Current weather conditions for a location
      operations:
      - method: GET
        name: get-current-weather
        description: Get current weather conditions
        call: accuweather.get-current-conditions
        with:
          locationKey: rest.locationKey
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/weather/forecast/hourly/{locationKey}
      name: hourly-forecast
      description: Hourly weather forecast
      operations:
      - method: GET
        name: get-hourly-forecast
        description: Get hourly weather forecast
        call: accuweather.get-hourly-forecast
        with:
          locationKey: rest.locationKey
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/weather/forecast/daily/{locationKey}
      name: daily-forecast
      description: Daily weather forecast
      operations:
      - method: GET
        name: get-daily-forecast
        description: Get daily weather forecast
        call: accuweather.get-daily-forecast
        with:
          locationKey: rest.locationKey
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/weather/minutecast/{locationKey}
      name: minutecast
      description: Minute-by-minute precipitation forecast
      operations:
      - method: GET
        name: get-minutecast
        description: Get MinuteCast precipitation forecast
        call: accuweather.get-minutecast
        with:
          locationKey: rest.locationKey
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/air-quality/{locationKey}
      name: air-quality
      description: Air quality data
      operations:
      - method: GET
        name: get-air-quality
        description: Get current air quality
        call: accuweather.get-air-quality
        with:
          locationKey: rest.locationKey
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/storms/active/{locationKey}
      name: active-storms
      description: Active tropical storm tracking
      operations:
      - method: GET
        name: get-active-storms
        description: Get all active global storms
        call: accuweather.get-active-storms
        with:
          locationKey: rest.locationKey
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: weather-intelligence-mcp
    transport: http
    description: MCP server for AI-assisted weather intelligence and forecasting workflows.
    tools:
    - name: search-locations
      description: Search for weather locations by partial name or query text
      hints:
        readOnly: true
        openWorld: true
      call: accuweather.autocomplete-locations
      with:
        Query: tools.query
      outputParameters:
      - type: object
        mapping: $.
    - name: get-current-weather
      description: Get current weather conditions for a location key
      hints:
        readOnly: true
        openWorld: true
      call: accuweather.get-current-conditions
      with:
        locationKey: tools.locationKey
      outputParameters:
      - type: object
        mapping: $.
    - name: get-hourly-forecast
      description: Get hourly weather forecast for the next 12-120 hours
      hints:
        readOnly: true
        openWorld: true
      call: accuweather.get-hourly-forecast
      with:
        locationKey: tools.locationKey
      outputParameters:
      - type: object
        mapping: $.
    - name: get-daily-forecast
      description: Get 1, 5, 7, 10, or 15 day weather forecast
      hints:
        readOnly: true
        openWorld: true
      call: accuweather.get-daily-forecast
      with:
        locationKey: tools.locationKey
      outputParameters:
      - type: object
        mapping: $.
    - name: get-minutecast
      description: Get AccuWeather MinuteCast minute-by-minute precipitation forecast
      hints:
        readOnly: true
        openWorld: true
      call: accuweather.get-minutecast
      with:
        locationKey: tools.locationKey
      outputParameters:
      - type: object
        mapping: $.
    - name: get-air-quality
      description: Get current air quality index and pollutant data
      hints:
        readOnly: true
        openWorld: true
      call: accuweather.get-air-quality
      with:
        locationKey: tools.locationKey
      outputParameters:
      - type: object
        mapping: $.
    - name: get-hourly-air-quality
      description: Get hourly air quality forecast
      hints:
        readOnly: true
        openWorld: true
      call: accuweather.get-hourly-air-quality
      with:
        locationKey: tools.locationKey
      outputParameters:
      - type: object
        mapping: $.
    - name: get-active-storms
      description: Get all currently active tropical storms globally
      hints:
        readOnly: true
        openWorld: true
      call: accuweather.get-active-storms
      with:
        locationKey: tools.locationKey
      outputParameters:
      - type: object
        mapping: $.
    - name: get-storm-details
      description: Get detailed tracking data for a specific tropical storm
      hints:
        readOnly: true
        openWorld: true
      call: accuweather.get-storm-details
      with:
        year: tools.year
        basinId: tools.basinId
        depressionNumber: tools.depressionNumber
      outputParameters:
      - type: object
        mapping: $.
